# 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
        # It is present in docker hub we are pulling this
          image: prom/prometheus
          # We are telling prometheus to use this config file - directs prometheus use the custom config file - prometheus.yml will
          # generated in prometheus which will be generated by prometheus-config
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          # We are making a volume here for config
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: config-volume
          configMap:
          # We are telling prometheus to use this config file - directs prometheus use the custom config file - prometheus.yml will
          # generated in prometheus which will be generated by prometheus-config
          # prometheus.yml is the config file for prometheus
          # prometheus-config is the name of the configmap
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
    # Port 9090 is the default port for prometheus
      port: 9090
      # Target port is the port on which the container is running
      targetPort: 9090
      # Node port is the port on which the service is exposed
      nodePort: 32001 
  type: NodePort